# ─────────────────────────────────────────────────────────────
# GitHub Pages / Jekyll 配置
# waldorf.work
# ─────────────────────────────────────────────────────────────

# 站点基础信息
title: 上海卫道夫投资管理有限公司
description: 专注股权投后管理，守护股东权益，优化公司治理。
url: "https://www.waldorf.work"
baseurl: ""

# 语言 & 时区
lang: zh-CN
timezone: Asia/Shanghai

# Jekyll 主题（纯静态站点不需要主题，设为空覆盖默认）
theme: null

# 不处理以下目录/文件（直接原样输出）
exclude:
  - README.md
  - "*.sh"
  - node_modules/
  - package.json
  - package-lock.json

# 静态文件直通（GitHub Pages 默认会忽略下划线开头目录）
include:
  - assets/

# 关闭 Sass 处理（我们使用纯 CSS）
sass:
  style: compressed

# 关闭 CoffeeScript 处理
plugins: []

# 安全模式（GitHub Pages 推荐）
safe: true
