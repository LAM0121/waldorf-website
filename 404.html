<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>页面未找到 · WALDORF</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
  /* 404 专属样式 — 覆盖 scroll-lock */
  html,body{overflow:auto !important;height:auto !important;touch-action:auto}
  .not-found{
    min-height:100dvh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:120px 24px 60px;
    background:var(--c-bg);position:relative;overflow:hidden;
  }
  .not-found::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 80% 60% at 50% 40%,
      rgba(200,168,75,.04) 0%,transparent 70%);
    pointer-events:none;
  }
  .err-code{
    font-size:clamp(96px,18vw,180px);font-weight:300;
    font-family:var(--font-en);color:rgba(200,168,75,.15);
    line-height:1;letter-spacing:-.04em;
    position:relative;z-index:1;
  }
  .err-logo{width:52px;height:52px;margin:0 auto 20px;position:relative;z-index:1}
  .err-title{
    font-size:clamp(20px,3vw,28px);color:var(--c-gold);
    font-weight:700;margin-bottom:12px;position:relative;z-index:1;
  }
  .err-sub{
    font-size:15px;color:var(--c-grey);line-height:1.8;
    max-width:420px;margin:0 auto 40px;position:relative;z-index:1;
  }
  .err-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
  .err-divider{
    display:flex;align-items:center;gap:12px;
    margin:32px auto;max-width:240px;position:relative;z-index:1;
  }
  .err-divider::before,.err-divider::after{
    content:'';flex:1;height:1px;background:var(--c-border);
  }
  .err-divider span{font-size:11px;color:var(--c-grey-d);letter-spacing:.2em;font-family:var(--font-en)}
  @media(max-width:480px){
    .err-actions{flex-direction:column;align-items:stretch;max-width:260px}
  }
</style>
</head>
<body>
<!-- Nav -->
<nav id="main-nav" role="navigation" aria-label="主导航">
  <a href="/" class="nav-logo" aria-label="WALDORF 首页">
    <img src="/assets/img/logo.svg" class="nav-logo-icon" alt="WALDORF 卫道夫" width="34" height="34">
    <div class="nav-logo-text">
      <span class="nav-logo-cn">上海卫道夫投资管理有限公司</span>
    </div>
  </a>
  <ul class="nav-links" role="list">
    <li><a href="/">首页</a></li>
    <li><a href="/#services">服务矩阵</a></li>
    <li><a href="/#cases">项目案例</a></li>
    <li><a href="/#contact">联系我们</a></li>
    <li><a href="/report-center.html" class="nav-report">报告中心</a></li>
  </ul>
</nav>

<main class="not-found" role="main">
  <div class="err-code" aria-hidden="true">404</div>
  <img src="/assets/img/logo.svg" class="err-logo" alt="" aria-hidden="true">
  <h1 class="err-title">页面不存在</h1>
  <p class="err-sub">您访问的页面已移动或不存在。<br>请返回首页继续浏览卫道夫投资管理服务。</p>
  <div class="err-actions">
    <a href="/" class="btn-gold">返回首页</a>
    <a href="/#contact" class="btn-outline">联系我们</a>
  </div>
  <div class="err-divider"><span>WALDORF</span></div>
  <p style="font-size:11px;color:var(--c-grey-d);font-family:var(--font-en);letter-spacing:.15em">
    ORDO · FIDES · TEMPUS
  </p>
</main>

<script>
  // 404 页无需翻页引擎，只需 nav 收缩
  window.addEventListener('scroll',()=>{
    const nav = document.getElementById('main-nav');
    if(nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  },{passive:true});
</script>
</body>
</html>
